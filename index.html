<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Прайс-лист</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #f0ece2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background-color: #e8e2d8;
            border-radius: 24px;
            padding: 30px 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }
        /* Декор */
        .container::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background-color: #d6cfc4;
            border-radius: 50%;
            opacity: 0.5;
        }
        /* Заголовок */
        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 2;
        }
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            font-weight: 400;
            letter-spacing: 2px;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #5c5550;
        }
        .divider {
            width: 40px;
            height: 1px;
            background-color: #1a1a1a;
            margin: 8px auto 0;
        }

        /* Список цен */
        .price-list {
            position: relative;
            z-index: 2;
        }
        .price-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 12px 0;
            border-bottom: 1px dashed rgba(26, 26, 26, 0.1);
        }
        .price-item:last-of-type {
            border-bottom: none;
        }
        .service-name {
            font-size: 16px;
            font-weight: 400;
            color: #2c2c2c;
            line-height: 1.3;
            flex-shrink: 0;
            background-color: #e8e2d8;
            padding-right: 5px;
        }
        .dots {
            flex-grow: 1;
            border-bottom: 1px dotted rgba(44, 44, 44, 0.2);
            margin: 0 10px;
            height: 1em;
            min-width: 10px;
        }
        .price-val {
            font-size: 16px;
            font-weight: 500;
            color: #1a1a1a;
            background-color: #e8e2d8;
            padding-left: 5px;
            white-space: nowrap;
        }

        /* Акцентные выделения */
        .highlight .service-name {
            font-weight: 600;
        }
        .highlight .price-val {
            font-weight: 600;
        }
        .highlight .dots {
            border-bottom: 1px solid rgba(44, 44, 44, 0.5);
        }
        .free .price-val {
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #856a56;
        }
        .free .service-name {
            font-size: 14px;
            font-weight: 300;
        }
        
        /* Футер */
        .footer {
            margin-top: 30px;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        .footer-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 15px;
            color: #3b3835;
            opacity: 0.9;
        }
        .footer-divider {
            width: 60px;
            height: 1px;
            background-color: #1a1a1a;
            margin: 12px auto 0;
        }

        /* Адаптация под очень маленькие экраны (iPhone SE и т.д.) */
        @media (max-width: 370px) {
            .title { font-size: 28px; }
            .service-name { font-size: 14px; }
            .price-val { font-size: 14px; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">PRICE</div>
            <div class="subtitle">Прайс-лист</div>
            <div class="divider"></div>
        </div>

        <div class="price-list">
            <div class="price-item">
                <span class="service-name">Классическое наращивание</span>
                <span class="dots"></span>
                <span class="price-val">от 1 600 ₽</span>
            </div>
            <div class="price-item">
                <span class="service-name">Наращивание 2D</span>
                <span class="dots"></span>
                <span class="price-val">1 800 ₽</span>
            </div>
            <div class="price-item">
                <span class="service-name">Наращивание 3D</span>
                <span class="dots"></span>
                <span class="price-val">2 000 ₽</span>
            </div>
            <div class="price-item">
                <span class="service-name">Наращивание 4D</span>
                <span class="dots"></span>
                <span class="price-val">2 200 ₽</span>
            </div>
            <div class="price-item highlight">
                <span class="service-name">Мокрый эффект (Wet Look)</span>
                <span class="dots"></span>
                <span class="price-val">1 800 ₽</span>
            </div>
            <div class="price-item">
                <span class="service-name">Дизайн «Лучики»</span>
                <span class="dots"></span>
                <span class="price-val">300 ₽</span>
            </div>
            <div class="price-item free">
                <span class="service-name">Снятие с последующим наращиванием</span>
                <span class="dots"></span>
                <span class="price-val">Бесплатно</span>
            </div>
            <div class="price-item free">
                <span class="service-name">Снятие чужой работы</span>
                <span class="dots"></span>
                <span class="price-val">Бесплатно</span>
            </div>
        </div>

        <div class="footer">
            <div class="footer-text">ты достойна самого лучшего</div>
            <div class="footer-divider"></div>
        </div>
    </div>
</body>
</html>
